<!DOCTYPE html>
<html lang="de">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">
<title>Gerüst & Flächenlast Rechner</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:#f3f4f6;
margin:0;
}

.hero{
height:460px;
background:url("https://cms.prod.photon.sveasolar.com/api/headless/images?id=1060&w=2000&q=80") center/cover;
display:flex;
align-items:center;
justify-content:center;
position:relative;
padding-top:120px;
}
.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(90deg,rgba(0,0,0,0.65),rgba(0,0,0,0.15));
}

.hero-inner{
position:relative;
z-index:8;
color:white;
width:1000px;
margin:0 auto;
}

.hero h1{
font-size:48px;
margin:0;
}

.panel{
width:1000px;
margin:-380px auto 60px auto;
background:white;
border-radius:24px;
box-shadow:0 30px 60px rgba(0,0,0,0.12);
padding:40px;
}

.row{
display:flex;
gap:20px;
margin-bottom:18px;
}

input,select{
flex:1;
padding:14px;
border-radius:12px;
border:1px solid #e5e7eb;
}

.btn{
padding:14px;
border-radius:999px;
background:linear-gradient(110deg,#ff4b2b,#d600c8);
color:white;
border:none;
cursor:pointer;
}

.card{
background:#f9fafb;
padding:20px;
border-radius:16px;
margin-top:20px;
}

.hidden{display:none}
.error{color:red;font-weight:600}

</style>
</head>

<body>

<div class="hero">
<div class="hero-inner">
<h1>Kalkulator</h1>
</div>
</div>

<div class="panel">

<!-- TRYB -->
<div class="row">
<select id="mode" onchange="switchMode()">
<option value="wind">Wind & Schnee</option>
<option value="scaffold">Gerüst Kalkulator</option>
</select>
</div>

<!-- ================= WIND ================= -->
<div id="windUI">

<input id="address" placeholder="Adresse">
<input id="pitch" type="number" placeholder="Dachneigung">
<input id="height" type="number" placeholder="Gebäudehöhe">

<button class="btn" onclick="calc()">Berechnen</button>

<div id="results"></div>

</div>

<!-- ================= GERÜST ================= -->
<div id="scaffoldUI" class="hidden">

<input id="g_height" type="number" placeholder="Gerüsthöhe (m)">
<input id="g_length" type="number" placeholder="Länge (m)">
<input id="g_width" type="number" placeholder="Breite (m)">
<input id="g_area" type="number" placeholder="oder Fläche (m²)">
<input id="g_pitch" type="number" placeholder="Dachneigung">

<select id="g_roofType" onchange="updateRoofFields()">
<option value="">Dachform</option>
<option value="flat">Flachdach</option>
<option value="gable">Satteldach</option>
</select>

<div id="roofFields"></div>

<select id="g_tax">
<option value="net">Netto</option>
<option value="gross">Brutto</option>
</select>

<button class="btn" onclick="calcScaffold()">Berechnen</button>

<div id="scaffoldResult"></div>

</div>

</div>

<script>

// ================= SWITCH =================
function switchMode(){
let m=document.getElementById("mode").value

document.getElementById("windUI").style.display =
m==="wind"?"block":"none"

document.getElementById("scaffoldUI").style.display =
m==="scaffold"?"block":"none"
}

// ================= ROOF =================
function updateRoofFields(){

let t=document.getElementById("g_roofType").value
let div=document.getElementById("roofFields")

if(t==="flat"){
div.innerHTML=`<input id="g_attika" placeholder="Attikahöhe (m)">`
}
else if(t==="gable"){
div.innerHTML=`
<input id="g_ridge" placeholder="Firsthöhe">
<select id="g_sideSec">
<option value="">Sicherung</option>
<option value="yes">Mit</option>
<option value="no">Ohne</option>
</select>
`
}
}

// ================= GERÜST CALC =================
async function calcScaffold(){

// WALIDACJA
if(!g_height.value || !g_pitch.value){
scaffoldResult.innerHTML="<div class='error'>Uzupełnij dane</div>"
return
}

let data={
height: parseFloat(g_height.value),
length: parseFloat(g_length.value)||null,
width: parseFloat(g_width.value)||null,
area: parseFloat(g_area.value)||null,
roof_pitch: parseFloat(g_pitch.value),
roof_type: g_roofType.value,
attika: g_attika?parseFloat(g_attika.value):null,
ridge: g_ridge?parseFloat(g_ridge.value):null,
sideSec: g_sideSec?g_sideSec.value:null,
tax: g_tax.value
}

let r=await fetch("https://wind-snow-api.onrender.com/scaffold-calc",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

let j=await r.json()

if(j.error){
scaffoldResult.innerHTML="<div class='error'>"+j.error+"</div>"
return
}

scaffoldResult.innerHTML=`
<div class="card">
<div>Fläche: ${j.area.toFixed(2)} m²</div>
<div>Grundpreis: ${j.base_cost.toFixed(2)} €</div>
<div>Sicherung: ${j.security_cost.toFixed(2)} €</div>
<hr>
<div><b>Gesamt: ${j.total.toFixed(2)} €</b></div>
</div>
`
}

</script>

</body>
</html>
