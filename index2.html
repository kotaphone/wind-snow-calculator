
<!DOCTYPE html>
<html lang="de">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">
<title>Gerüst Kalkulator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:#f3f4f6;
margin:0;
}

.hero{
height:460px;
background:url("https://cms.prod.photon.sveasolar.com/api/headless/images?id=1060&w=2000&q=80") center/cover;
display:flex;
align-items:center;
justify-content:center;
position:relative;
padding-top:120px;
}
.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(90deg,rgba(0,0,0,0.65),rgba(0,0,0,0.15));
}

.hero-inner{
position:relative;
z-index:8;
color:white;
width:1000px;
margin:0 auto;
}

.hero h1{
font-size:48px;
margin:0;
}

.panel{
width:1000px;
margin:-220px auto 60px auto;
background:white;
border-radius:24px;
box-shadow:0 30px 60px rgba(0,0,0,0.12);
padding:40px;
position:relative;
z-index:5;
}

.row{
display:flex;
gap:20px;
margin-bottom:18px;
}

input,select{
flex:1;
padding:14px;
border-radius:12px;
border:1px solid #e5e7eb;
}

.btn{
padding:14px 26px;
border-radius:999px;
background:linear-gradient(110deg,#ff4b2b,#d600c8);
color:white;
border:none;
cursor:pointer;
}

.card{
background:#f9fafb;
padding:22px;
border-radius:16px;
margin-top:20px;
}

.error{
color:red;
font-weight:600;
}

</style>
</head>

<body>

<div class="hero">
<div class="hero-inner">
<h1>Gerüst Kalkulator</h1>
</div>
</div>

<div class="panel">

<div class="row">
<input id="g_height" type="number" placeholder="Traufhöhe (m)">
<select id="g_pitch">
<option value="">Dachneigung</option>
<option value="0-20">0° – 20°</option>
<option value="20-30">20° – 30°</option>
<option value="30-40">30° – 40°</option>
<option value="40-60">40° – 60°</option>
</select>
</div>

<div class="row">
<input id="g_length" type="number" placeholder="Gerüstlänge (m)">
<input id="g_width" type="number" placeholder="Ortganglänge (m)">
</div>

<div class="row">
<select id="g_roofType" onchange="updateRoofFields()">
<option value="">Dachform wählen</option>
<option value="flat">Flachdach</option>
<option value="gable">Satteldach</option>
</select>
</div>

<div id="roofFields"></div>

<div class="row">
<select id="g_tax">
<option value="net">Ohne MwSt</option>
<option value="gross">Mit MwSt (19%)</option>
</select>
</div>

<button class="btn" onclick="calcScaffold()">Berechnen</button>

<div id="result"></div>

</div>

<script>

function updateRoofFields(){

let type = document.getElementById("g_roofType").value
let div = document.getElementById("roofFields")

if(type === "flat"){
div.innerHTML = `
<div class="row">
<input id="g_attika" type="number" placeholder="Attikahöhe (m)">
</div>`
}

else if(type === "gable"){
div.innerHTML = `
<div class="row">
<input id="g_ridge" type="number" placeholder="Firsthöhe (m)">
</div>

<div class="row">
<select id="g_sideSec">
<option value="">Seitensicherung wählen</option>
<option value="yes">Mit Sicherung</option>
<option value="no">Ohne Sicherung</option>
</select>
</div>`
}

else{
div.innerHTML = ""
}

}

async function calcScaffold(){

let result = document.getElementById("result")
result.innerHTML = ""

let data = {
height: parseFloat(g_height.value),
length: parseFloat(g_length.value),
width: parseFloat(g_width.value),
roof_pitch: g_pitch.value,
roof_type: g_roofType.value,
attika: g_attika ? parseFloat(g_attika.value) : null,
ridge: g_ridge ? parseFloat(g_ridge.value) : null,
sideSec: g_sideSec ? g_sideSec.value : null,
tax: g_tax.value
}

try{

let r = await fetch("https://wind-snow-api.onrender.com/scaffold-calc",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify(data)
})

let j = await r.json()

if(j.error){
result.innerHTML = "<div class='error'>" + j.error + "</div>"
return
}

result.innerHTML = `
<div class="card">
<div><b>Gerüstlänge:</b> ${j.length} m</div>
<div><b>Grundpreis:</b> ${j.base_cost.toFixed(2)} €</div>
<div><b>Seitensicherung:</b> ${j.security_cost.toFixed(2)} €</div>
<hr>
<div><b>Gesamt:</b> ${j.total.toFixed(2)} €</div>
</div>
`

}catch(e){
result.innerHTML = "<div class='error'>Server Fehler</div>"
}

}

</script>

</body>
</html>
